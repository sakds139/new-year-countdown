<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern New Year Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* ผสมฟอนต์ Kanit สำหรับภาษาไทย และ Poppins สำหรับภาษาอังกฤษ/ตัวเลข */
            font-family: 'Poppins', 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #ffffff;
            overflow: hidden;
        }

        /* Canvas for fireworks */
        #fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Container for UI */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 60px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 90%;
        }

        h1 {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .countdown-timer {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            min-width: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time-box span.number {
            font-size: 3.5em;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-box span.label {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
        }
        
        /* สไตล์สำหรับข้อความแซวคนโสด */
        .funny-text {
            margin-top: 35px;
            font-size: 1.2em;
            font-weight: 300;
            color: #f0f0f0;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .funny-text span.highlight {
            font-size: 1.5em;
            font-weight: 700;
            color: #ff0043; /* เน้นสีแดงให้ตัวเลขวัน */
            margin: 0 5px;
        }

        .celebration-text {
            display: none;
            font-size: 4em;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .countdown-timer { gap: 10px; flex-wrap: wrap; }
            .time-box { min-width: 75px; padding: 15px; }
            .time-box span.number { font-size: 2.2em; }
            .celebration-text { font-size: 2.5em; }
            .funny-text { font-size: 1em; }
        }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div class="container" id="ui-container">
        <h1 id="title">Countdown to New Year</h1>
        
        <div class="countdown-timer" id="timer">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
        
        <!-- ข้อความแซว -->
        <div class="funny-text" id="funny-text">
            คุณจะโสดไปอีก <span class="highlight" id="single-days">0</span> วัน จนถึงเคาท์ดาวน์เลยเหรอ !! 🥺
        </div>

        <div class="celebration-text" id="celebration">
            🎉 Happy New Year! 🎉
        </div>
    </div>

    <script>
        // --- Countdown Logic ---
        const currentYear = new Date().getFullYear();
        // ตั้งเป้าหมายเป็นวันที่ 1 มกราคม ของปีถัดไป
        const newYearTime = new Date(`January 1, ${currentYear + 1} 00:00:00`).getTime();

        const timerElement = document.getElementById('timer');
        const titleElement = document.getElementById('title');
        const funnyTextElement = document.getElementById('funny-text');
        const celebrationElement = document.getElementById('celebration');

        // ฟังก์ชันอัปเดตเวลา
        function updateCountdown() {
            const now = new Date().getTime();
            const gap = newYearTime - now;

            if (gap <= 0) {
                // เมื่อถึงเวลาปีใหม่ ซ่อนตัวนับเวลาและข้อความแซว
                clearInterval(countdownInterval);
                timerElement.style.display = 'none';
                titleElement.style.display = 'none';
                funnyTextElement.style.display = 'none';
                celebrationElement.style.display = 'block';
                startFireworks();
                return;
            }

            // คำนวณเวลา
            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const d = Math.floor(gap / day);
            const h = Math.floor((gap % day) / hour);
            const m = Math.floor((gap % hour) / minute);
            const s = Math.floor((gap % minute) / second);

            // นำไปแสดงผลบนกล่องนับเวลา
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

            // อัปเดตตัวเลขวันในข้อความแซวคนโสด
            document.getElementById('single-days').innerText = d;
        }

        const countdownInterval = setInterval(updateCountdown, 1000);
        updateCountdown(); // เรียกใช้งานทันทีครั้งแรก


        // --- Fireworks Animation Logic ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworkInterval;

        // ปรับขนาด canvas ให้พอดีจอ
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 2;
                this.speedX = Math.cos(angle) * velocity;
                this.speedY = Math.sin(angle) * velocity;
                this.gravity = 0.05; 
                this.friction = 0.96; 
                this.alpha = 1; 
                this.decay = Math.random() * 0.015 + 0.01; 
            }

            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function launchFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.5); 
            const colors = ['#ff0043', '#14fc56', '#1e7fff', '#e600ff', '#ffb400'];
            const color = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < 80; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animateFireworks() {
            requestAnimationFrame(animateFireworks);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }

        function startFireworks() {
            animateFireworks();
            fireworkInterval = setInterval(launchFirework, 600);
        }
    </script>
</body>
</html>
